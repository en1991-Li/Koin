<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Koin記帳</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="phone-container">
        <div id="overlay" class="overlay" onclick="closeAllSheets()"></div>

        <main class="content-area no-scrollbar">
            <div id="page-list" class="page active">
                <header class="top-nav">
                    <i data-lucide="eye" class="icon-btn"></i>
                    <h2 class="title">帳戶總覽</h2>
                    <div class="right-icons">
                        <i data-lucide="maximize" class="icon-btn"></i>
                        <i data-lucide="plus" class="icon-btn" onclick="openAddPage()"></i>
                    </div>
                </header>

                <section class="dashboard">
                    <div class="total-box">
                        <p class="total-label">總額 TWD</p>
                        <h1 id="total-val" class="total-amount">0</h1>
                    </div>
                    <div class="stats-row">
                        <span class="stat-item">總資產 <b id="asset-val" class="text-green">0</b></span>
                        <span class="stat-item">總負債 <b id="debt-val" class="text-red">0</b></span>
                    </div>
                    <div class="chart-links">
                        <span><i data-lucide="pie-chart" class="small-icon"></i> 各分組佔比</span>
                        <span><i data-lucide="pie-chart" class="small-icon"></i> 各幣種佔比</span>
                    </div>

                    <div class="chart-container">
                        <div class="mock-chart">
                            </div>
                        <div class="chart-dates">
                            <span>3/17</span><span>3/19</span><span>3/21</span><span>3/23</span><span>3/25</span>
                        </div>
                    </div>
                </section>

                <div class="list-header">
                    <span class="date-tag"><i data-lucide="calendar" class="mini-icon"></i> 2026/03/26 週四</span>
                    <div class="filter-dropdown">按日 <i data-lucide="chevron-down"></i></div>
                </div>

                <div id="main-list" class="account-list">
                    <div class="group-item">
                        <span class="group-name">+ 現金 (3)</span>
                        <span class="group-value text-red">-$36,306</span>
                    </div>
                    <div class="group-item">
                        <span class="group-name">+ 銀行 (4)</span>
                        <span class="group-value text-green">+$32,571</span>
                    </div>
                </div>
            </div>

            <div id="page-add-account" class="page">
                <header class="top-nav">
                    <i data-lucide="x" class="icon-btn" onclick="closeAddPage()"></i>
                    <h2 class="title">新增帳戶 <i data-lucide="info" class="mini-icon"></i></h2>
                    <div class="right-icons">
                        <i data-lucide="check" class="icon-btn" onclick="saveAccount()"></i>
                    </div>
                </header>

                <section class="add-account-form">
                    <div class="account-header-icon">
                        <div class="icon-circle-large">
                            <i data-lucide="credit-card"></i>
                        </div>
                        <div class="balance-display">
                            <span class="label">餘額 TWD</span>
                            <span class="value" id="header-balance-val">0</span>
                        </div>
                        <input type="text" class="memo-input" placeholder="請在這裡填寫備註事項">
                    </div>

                    <div class="form-list">
                        <div class="form-item">
                            <label>名稱</label>
                            <input type="text" placeholder="尚未設定" id="acc-name" class="text-right">
                        </div>
                        <div class="form-item">
                            <label>主幣種</label>
                            <span class="val-text">TWD</span>
                        </div>
                        <div class="form-item">
                            <label>帳戶分組</label>
                            <span class="val-text">現金 <i data-lucide="chevron-right" class="mini-icon"></i></span>
                        </div>
                        <div class="form-item">
                            <label>初始金額</label>
                            <input type="number" value="0" id="acc-balance" class="text-right">
                        </div>
                        <div class="form-item">
                            <label>帳單週期</label>
                            <span class="val-text">2026/03/01 － 2026/03/31</span>
                        </div>
                        
                        <div class="form-divider"></div>

                        <div class="form-item">
                            <label>信用帳戶</label>
                            <label class="switch">
                                <input type="checkbox" id="is-credit">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="form-item">
                            <label>主帳戶</label>
                            <span class="val-text gray">無</span>
                        </div>
                        </div>
                </section>
            </div>
        </main>

        <nav class="tab-bar">
            <div class="tab-item active" onclick="switchTab(this, 'page-list')">
                <i data-lucide="wallet" class="tab-icon"></i>
            </div>
            <div class="tab-item">
                <i data-lucide="briefcase" class="tab-icon"></i>
            </div>
            
            <div class="fab-wrapper" onclick="openAddPage()">
                <div class="fab-diamond">
                    <div class="fab-icon">
                        <i data-lucide="plus"></i>
                    </div>
                </div>
            </div>

            <div class="tab-item">
                <i data-lucide="line-chart" class="tab-icon"></i>
            </div>
            <div class="tab-item">
                <i data-lucide="sliders-horizontal" class="tab-icon"></i>
            </div>
        </nav>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
