<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Koin記帳</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="phone-container">
        
        <section id="page-overview" class="page active">
            <header class="nav-header">
                <i data-lucide="eye" class="s-icon"></i>
                <h1 class="page-title">帳戶總覽</h1>
                <div style="display: flex; gap: 15px;">
                    <i data-lucide="maximize" class="s-icon"></i>
                    <i data-lucide="plus" class="s-icon" onclick="showPage('page-add-account')"></i>
                </div>
            </header>

            <div class="content-scroll no-scrollbar">
                <div class="balance-hero">
                    <div class="label">總額 TWD</div>
                    <div class="amount" id="total-balance">0</div>
                    <div class="sub-stats">
                        <span>總資產 <span class="text-green">0</span></span>
                        <span>總負債 <span class="text-red">0</span></span>
                    </div>
                </div>

                <div class="chart-section">
                    <canvas id="overviewChart"></canvas>
                </div>

                <div class="list-divider">
                    <span class="date-text">● 2026/04/07 週二 <i data-lucide="rotate-ccw" class="s-icon"></i></span>
                    <div class="filter-btn">按日 <i data-lucide="chevron-down" class="s-icon"></i></div>
                </div>

                <div class="account-list">
                    <div class="group-item">
                        <span class="group-name">+ 現金 </span>
                        <span class="group-value text-red">-$0</span>
                    </div>
                    <div class="group-item">
                        <span class="group-name">+ 銀行 </span>
                        <span class="group-value text-green">+$0</span>
                    </div>
                </div>
            </div>
        </section>

        <section id="page-add-account" class="page">
            <header class="nav-header">
                <i data-lucide="x" class="s-icon" onclick="showPage('page-overview')"></i>
                <h1 class="page-title">新增帳戶 <i data-lucide="info" class="s-icon" style="width:14px"></i></h1>
                <i data-lucide="check" class="s-icon" onclick="handleAccountSubmit()"></i>
            </header>

            <div class="content-scroll no-scrollbar">
                <div class="add-acc-hero">
                    <div class="icon-box">
                        <i data-lucide="credit-card" style="width: 32px; height: 32px;"></i>
                    </div>
                    <div class="hero-balance">
                        <div class="label">餘額 TWD</div>
                        <div class="val text-green" id="add-display-amount">0</div>
                    </div>
                    <input type="text" class="memo-field" placeholder="請在這裡填寫備註事項">
                </div>

                <div class="form-group">
                    <div class="form-row">
                        <label>名稱</label>
                        <input type="text" placeholder="尚未設定" class="text-right">
                    </div>
                    <div class="form-row" onclick="openGroupPicker()">
                        <label>帳戶分組</label>
                        <span id="selected-group-text">現金 <i data-lucide="chevron-right" class="s-icon"></i></span>
                    </div>

                    <div class="form-row" onclick="openCyclePicker()">
                        <label>帳單週期</label>
                        <span id="display-main-cycle">2026/04/01 － 2026/04/30 <i data-lucide="chevron-right" class="s-icon"></i></span>
                    </div>
                    
                    <div class="form-row">
                        <label>信用帳戶</label>
                        <label class="switch">
                            <input type="checkbox" id="in-is-credit" onchange="toggleCreditFields()">
                            <span class="slider"></span>
                        </label>
                    </div>

                    <div id="credit-extra-fields" style="display: none;">
                        <div class="form-row sub-row" onclick="openDueDateTypePicker()">
                            <label>— 繳款期限</label>
                            <span id="display-main-due-date">每月 1 號 <i data-lucide="chevron-right" class="s-icon"></i></span>
                        </div>
                        <div class="form-row sub-row">
                            <label>— 信用額度</label>
                            <input type="number" placeholder="0" class="text-right">
                        </div>
                    </div>

                    <div class="form-row">
                        <label>自動儲值</label>
                        <label class="switch"><input type="checkbox"><span class="slider"></span></label>
                    </div>
                </div>
            </div>
        </section>

        <div id="group-picker-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">帳戶分組</div>
                <div class="modal-options">
                    <div class="option-item" onclick="selectGroup('現金')">現金</div>
                    <div class="option-item" onclick="selectGroup('銀行')">銀行</div>
                    <div class="option-item" onclick="selectGroup('信用卡')">信用卡</div>
                </div>
                <div class="modal-footer">
                    <button onclick="closeModal('group-picker-modal')">取消</button>
                </div>
            </div>
        </div>

        <div id="cycle-picker-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content" style="padding: 20px;">
                <div class="modal-header" style="border:none;">選擇結帳日</div>
                <div style="text-align: center; margin: 10px 0;">
                    <div id="modal-cycle-range" style="font-size: 18px; font-weight: bold; color: var(--blue);">2026/04/01 － 2026/04/30</div>
                    <div id="modal-cycle-note" class="text-muted" style="font-size: 13px; margin-top: 5px;">帳單結帳日：每月月底</div>
                </div>
                <input type="range" id="cycle-slider" min="1" max="28" value="28">
                <div style="display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted);">
                    <span>1 號</span><span>15 號</span><span>月底</span>
                </div>
                <div class="modal-footer" style="margin-top: 20px;">
                    <button onclick="closeModal('cycle-picker-modal')">取消</button>
                    <button class="btn-confirm" onclick="confirmCycle()">確定</button>
                </div>
            </div>
        </div>

        <div id="due-date-type-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content" style="padding: 20px; text-align: center;">
                <div class="icon-circle">!</div>
                <h3 style="margin-bottom: 10px;">繳款期限</h3>
                <p class="text-muted" style="font-size: 14px; margin-bottom: 20px;">請選擇您偏好的提醒方式</p>
                <button class="option-btn" onclick="selectDueDateType('fixed')">每月固定日期繳款</button>
                <button class="option-btn" onclick="selectDueDateType('after')">結帳日後幾天內繳款</button>
                <button style="background:none; border:none; color:var(--text-muted); margin-top:10px;" onclick="closeModal('due-date-type-modal')">取消</button>
            </div>
        </div>

        <nav class="tab-bar">
            <div class="tab-item active" onclick="showPage('page-overview')"><i data-lucide="archive"></i></div>
            <div class="tab-item"><i data-lucide="wallet"></i></div>
            <div class="tab-fab"><div class="fab-inner"><i data-lucide="layers"></i></div></div>
            <div class="tab-item"><i data-lucide="trending-up"></i></div>
            <div class="tab-item"><i data-lucide="sliders-horizontal"></i></div>
        </nav>

    </div>

    <script src="js/script.js"></script>
</body>
</html>
