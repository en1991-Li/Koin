<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Koin記帳</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="phone-container">
        
        <div id="page-overview" class="page active">
            <div class="nav-header">
                <i data-lucide="eye" class="s-icon"></i>
                <span class="page-title">帳戶總覽</span>
                <div class="nav-right">
                    <i data-lucide="maximize" class="s-icon"></i>
                    <i data-lucide="plus" class="s-icon" onclick="showPage('page-add-account')"></i>
                </div>
            </div>

            <div class="content-scroll no-scrollbar">
                <div class="balance-hero">
                    <div class="label">總額 TWD</div>
                    <div class="amount text-red">0</div>
                    <div class="sub-stats">
                        <span class="text-green">總資產 0</span>
                        <span class="text-red">總負債 0</span>
                    </div>
                    <div class="link-group">
                        <span><i data-lucide="pie-chart" class="s-icon"></i> 各分組佔比</span>
                        <span><i data-lucide="pie-chart" class="s-icon"></i> 各幣種佔比</span>
                    </div>
                </div>

                <div class="chart-section">
                    <canvas id="overviewChart"></canvas>
                </div>

                <div class="list-divider">
                    <span class="date-text"><i data-lucide="calendar" class="s-icon"></i> 2026/03/26 週四</span>
                    <button class="filter-btn">按日 <i data-lucide="chevron-down" class="s-icon"></i></button>
                </div>

                <div class="account-list">
                    <div class="group-item">
                        <span>+ 現金 </span>
                        <span class="text-red">-$0</span>
                    </div>
                    <div class="group-item">
                        <span>+ 銀行 </span>
                        <span class="text-green">+$0</span>
                    </div>
                    <div class="group-item">
                        <span>+ 數位銀行 </span>
                        <span class="text-green">+$0</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="page-add-account" class="page">
            <div class="nav-header">
                <i data-lucide="x" class="s-icon" onclick="showPage('page-overview')"></i>
                <span class="page-title">新增帳戶 <i data-lucide="info" class="s-icon"></i></span>
                <i data-lucide="check" class="s-icon" onclick="handleAccountSubmit()"></i>
            </div>

            <div class="content-scroll no-scrollbar">
                <div class="add-acc-hero">
                    <div class="icon-box">
                        <i data-lucide="credit-card" style="width: 32px; height: 32px;"></i>
                    </div>
                    <div class="hero-balance">
                        <div class="label text-muted">餘額 TWD</div>
                        <div class="val text-green" id="add-display-amount">0</div>
                    </div>
                    <input type="text" class="memo-field" placeholder="請在這裡填寫備註事項">
                </div>

                <div class="form-group">
                    <div class="form-row">
                        <label>名稱</label>
                        <input type="text" placeholder="尚未設定" class="text-right">
                    </div>
                    <div class="form-row">
                        <label>主幣種</label>
                        <span>TWD</span>
                    </div>
                    <div class="form-row" onclick="openGroupPicker()">
                        <label>帳戶分組</label>
                        <span id="selected-group-text">現金 <i data-lucide="chevron-right" class="s-icon"></i></span>
                    </div>
                    <div class="form-row">
                        <label>初始金額</label>
                        <input type="number" value="0" class="text-right">
                    </div>
                    
                    <div class="form-row">
                        <label>信用帳戶</label>
                        <label class="switch">
                            <input type="checkbox" id="in-is-credit" onchange="toggleCreditFields()">
                            <span class="slider"></span>
                        </label>
                    </div>

                    <div id="credit-extra-fields" style="display: none;">
                        <div class="form-row sub-row">
                            <label>— 繳款期限</label>
                            <span class="text-muted">2026/05/01</span>
                        </div>
                        <div class="form-row sub-row">
                            <label>— 信用額度</label>
                            <input type="number" value="0" class="text-right">
                        </div>
                    </div>

                    <div class="form-row">
                        <label>自動儲值</label>
                        <label class="switch">
                            <input type="checkbox">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <div class="tab-bar">
            <div class="tab-item active"><i data-lucide="wallet"></i></div>
            <div class="tab-item"><i data-lucide="archive"></i></div>
            <div class="tab-fab">
                <div class="fab-inner"><i data-lucide="layers"></i></div>
            </div>
            <div class="tab-item"><i data-lucide="trending-up"></i></div>
            <div class="tab-item"><i data-lucide="sliders"></i></div>
        </div>

    </div> <div id="group-picker-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">帳戶分組 <i data-lucide="plus" class="s-icon" style="float: right;"></i></div>
            <div class="option-list">
                <div class="option-item" onclick="selectGroup('現金')">現金</div>
                <div class="option-item" onclick="selectGroup('銀行')">銀行</div>
                <div class="option-item" onclick="selectGroup('數位銀行')">數位銀行</div>
                <div class="option-item" onclick="selectGroup('信用卡')">信用卡</div>
            </div>
            <div class="modal-footer">
                <button onclick="closeGroupPicker()">取消</button>
                <button class="btn-confirm">確定</button>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
