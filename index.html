<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koin - 完整資料互動版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        :root { --moze-bg: #1c1c28; --moze-card: #252538; --moze-border: #32324d; }
        body { background-color: black; font-family: 'Inter', sans-serif; color: white; overflow: hidden; }
        .phone-container { width: 100%; max-width: 414px; height: 100vh; background: var(--moze-bg); position: relative; margin: 0 auto; overflow: hidden; }
        
        .page { position: absolute; inset: 0; background: var(--moze-bg); display: none; flex-direction: column; z-index: 10; }
        .page.active { display: flex; }

        .sheet { position: absolute; bottom: 0; left: 0; right: 0; background: #2b2b3d; border-radius: 2rem 2rem 0 0; transform: translateY(100%); transition: transform 0.3s ease; z-index: 50; }
        .sheet.active { transform: translateY(0); }
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); display: none; z-index: 40; }
        .overlay.active { display: block; }

        .switch { position: relative; display: inline-block; width: 42px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #3f3f5a; transition: .3s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #60a5fa; }
        input:checked + .slider:before { transform: translateX(18px); }

        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid var(--moze-border); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="phone-container">
        <div id="overlay" class="overlay" onclick="closeAllSheets()"></div>

        <div id="page-list" class="page active">
            <div class="flex justify-between p-6">
                <i data-lucide="eye" class="w-7 h-7 text-gray-500"></i>
                <h2 class="text-xl font-bold">帳戶總覽</h2>
                <i data-lucide="plus" class="w-7 h-7 text-gray-500 cursor-pointer" onclick="openAddPage()"></i>
            </div>
            
            <div class="text-center">
                <div class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">總額 TWD</div>
                <div id="total-balance" class="text-7xl font-black text-[#f16565] leading-none my-2">0</div>
                <div class="flex justify-center gap-4 text-[12px] font-bold">
                    <span class="text-gray-500">總資產 <span id="total-assets" class="text-emerald-400">0</span></span>
                    <span class="text-gray-500">總負債 <span id="total-liabilities" class="text-rose-400">0</span></span>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto no-scrollbar mt-10 border-t border-[#32324d]" id="account-list-container">
                <div class="p-10 text-center text-gray-600 text-sm italic">尚無帳戶，請點擊 + 新增</div>
            </div>

            <div class="h-20 bg-[#1c1c28]/95 border-t border-[#32324d] flex justify-around items-center">
                <i data-lucide="layout-grid" class="w-7 h-7 text-blue-400"></i>
                <i data-lucide="wallet" class="w-7 h-7 text-gray-500"></i>
                <div class="bg-gradient-to-tr from-[#d886ff] to-[#3fe7ff] p-3 rounded-2xl shadow-lg -translate-y-2"><i data-lucide="aperture" class="text-white"></i></div>
                <i data-lucide="trending-up" class="w-7 h-7 text-gray-500"></i>
                <i data-lucide="sliders" class="w-7 h-7 text-gray-500"></i>
            </div>
        </div>

        <div id="page-add" class="page overflow-y-auto no-scrollbar">
            <div class="flex justify-between items-center p-6 sticky top-0 bg-[#1c1c28] z-20">
                <i data-lucide="x" class="w-8 h-8 cursor-pointer" onclick="closeAddPage()"></i>
                <h2 class="text-lg font-bold">新增帳戶</h2>
                <i data-lucide="check" class="w-8 h-8 text-blue-400 cursor-pointer" onclick="saveAccount()"></i>
            </div>

            <div class="flex flex-col items-center mt-2">
                <div class="w-20 h-20 bg-[#252538] rounded-full flex items-center justify-center mb-4 border border-[#32324d]">
                    <i data-lucide="landmark" class="w-10 h-10 text-white/80"></i>
                </div>
                <div class="text-center">
                    <div class="text-[10px] text-gray-500 font-bold uppercase">餘額 TWD</div>
                    <div id="preview-amount" class="text-6xl font-black text-[#a3e635] mt-1">0</div>
                </div>
            </div>

            <div class="mt-8 px-8 pb-10 space-y-2">
                <div class="list-item"><span class="text-sm font-semibold">名稱</span>
                    <input id="in-name" type="text" placeholder="例如：我的錢包" class="bg-transparent text-right outline-none text-sm text-white w-40"></div>
                
                <div class="list-item cursor-pointer" onclick="openSheet('group-sheet')"><span class="text-sm font-semibold">帳戶分組</span>
                    <div class="text-sm text-gray-400 flex items-center gap-1"><span id="in-group">尚未選擇</span><i data-lucide="chevron-right" class="w-4 h-4"></i></div></div>

                <div class="list-item"><span class="text-sm font-semibold">初始金額</span>
                    <input id="in-amount" type="number" value="0" oninput="document.getElementById('preview-amount').innerText=this.value" class="bg-transparent text-right outline-none text-sm text-white w-32 font-mono"></div>

                <div class="list-item"><span class="text-sm font-semibold">信用帳戶</span>
                    <label class="switch"><input type="checkbox" id="in-is-credit"><span class="slider"></span></label></div>
                
                <div class="list-item"><span class="text-sm font-semibold">納入總餘額</span>
                    <label class="switch"><input type="checkbox" id="in-include" checked><span class="slider"></span></label></div>
            </div>
        </div>

        <div id="group-sheet" class="sheet p-6 pb-12">
            <h3 class="text-center text-gray-500 text-xs font-bold mb-6 tracking-widest">選擇分組</h3>
            <div class="space-y-2">
                <button onclick="setGroup('現金')" class="w-full p-4 text-left bg-white/5 rounded-xl text-sm">現金</button>
                <button onclick="setGroup('銀行')" class="w-full p-4 text-left bg-white/5 rounded-xl text-sm">銀行</button>
                <button onclick="setGroup('數位銀行')" class="w-full p-4 text-left bg-white/5 rounded-xl text-sm">數位銀行</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let accounts = [];

        function openAddPage() { document.getElementById('page-add').classList.add('active'); }
        function closeAddPage() { document.getElementById('page-add').classList.remove('active'); }
        function openSheet(id) { document.getElementById('overlay').classList.add('active'); document.getElementById(id).classList.add('active'); }
        function closeAllSheets() { document.getElementById('overlay').classList.remove('active'); document.querySelectorAll('.sheet').forEach(s=>s.classList.remove('active')); }
        
        function setGroup(val) { 
            document.getElementById('in-group').innerText = val; 
            document.getElementById('in-group').classList.remove('text-gray-400');
            closeAllSheets(); 
        }

        //核心儲存邏輯
        function saveAccount() {
            const name = document.getElementById('in-name').value || "未命名帳戶";
            const group = document.getElementById('in-group').innerText;
            const amount = parseFloat(document.getElementById('in-amount').value) || 0;
            const isCredit = document.getElementById('in-is-credit').checked;
            const include = document.getElementById('in-include').checked;

            if(group === "尚未選擇") { alert("請選擇帳戶分組"); return; }

            // 新增資料
            accounts.push({ name, group, amount, isCredit, include });
            
            // 重新渲染介面
            renderAccounts();
            closeAddPage();
            
            // 清空輸入欄位備用
            document.getElementById('in-name').value = "";
            document.getElementById('in-group').innerText = "尚未選擇";
            document.getElementById('in-amount').value = 0;
            document.getElementById('preview-amount').innerText = 0;
        }

        function renderAccounts() {
            const container = document.getElementById('account-list-container');
            container.innerHTML = "";

            let totalAssets = 0;
            let totalLiabilities = 0;

            // 依分組顯示 (這裡簡化，直接列出所有新增的帳戶)
            accounts.forEach(acc => {
                const colorClass = acc.amount >= 0 ? 'text-emerald-400' : 'text-rose-400';
                const sign = acc.amount >= 0 ? '+' : '';
                
                if(acc.include) {
                    if(acc.amount >= 0) totalAssets += acc.amount;
                    else totalLiabilities += Math.abs(acc.amount);
                }

                const html = `
                    <div class="flex justify-between items-center p-5 border-b border-[#32324d]">
                        <div class="flex items-center gap-3">
                            <i data-lucide="chevron-right" class="w-4 h-4 text-gray-600"></i>
                            <div>
                                <p class="text-sm font-bold tracking-tight">${acc.name}</p>
                                <p class="text-[10px] text-gray-500 uppercase">${acc.group}</p>
                            </div>
                        </div>
                        <div class="font-mono font-bold ${colorClass} text-lg">${sign}${acc.amount.toLocaleString()}</div>
                    </div>
                `;
                container.innerHTML += html;
            });

            // 更新總額數字
            document.getElementById('total-assets').innerText = totalAssets.toLocaleString();
            document.getElementById('total-liabilities').innerText = totalLiabilities.toLocaleString();
            document.getElementById('total-balance').innerText = (totalAssets - totalLiabilities).toLocaleString();
            
            lucide.createIcons();
        }
    </script>
</body>
</html>
