<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Koin記帳</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="phone-container">
        <div id="overlay" class="overlay" onclick="closeAllSheets()"></div>

        <div class="content-area no-scrollbar">
            <div id="page-list" class="page active">
                <div class="flex-header">
                    <i data-lucide="eye" class="header-icon"></i>
                    <h2 class="header-title">帳戶總覽</h2>
                    <i data-lucide="plus" class="header-icon" onclick="openAddPage()"></i>
                </div>
                
                <div class="dashboard">
                    <p class="total-label">總額 TWD</p>
                    <h1 id="total-val" class="total-amount">0</h1>
                    <div class="stats-row">
                        <span>資產 <span id="asset-val" class="text-green">0</span></span>
                        <span>負債 <span id="debt-val" class="text-red">0</span></span>
                    </div>
                </div>

                <div id="main-list" class="account-list">
                    <div class="empty-state">尚未建立帳戶</div>
                </div>
            </div>
        </div>

        <nav class="tab-bar">
            <div class="tab-item active" onclick="switchTab(this, 'page-list')">
                <i data-lucide="wallet" class="tab-icon"></i>
                <span class="tab-label"></span>
            </div>
            <div class="tab-item" onclick="alert('功能開發中')">
                <i data-lucide="credit-card" class="tab-icon"></i>
                <span class="tab-label"></span>
            </div>
            
            <div class="fab-wrapper" onclick="openAddPage()">
                <div class="fab-diamond">
                    <div class="fab-icon"><i data-lucide="plus"></i></div>
                </div>
            </div>

            <div class="tab-item" onclick="alert('功能開發中')">
                <i data-lucide="line-chart" class="tab-icon"></i>
                <span class="tab-label"></span>
            </div>
            <div class="tab-item" onclick="alert('功能開發中')">
                <i data-lucide="sliders-horizontal" class="tab-icon"></i>
                <span class="tab-label"></span>
            </div>
        </nav>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
