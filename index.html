<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Koin記帳</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 表單元件樣式統一 */
        .form-select, .form-date {
            background: transparent;
            border: none;
            color: #FFFFFF;
            font-size: 15px;
            text-align: right;
            outline: none;
            direction: rtl;
            appearance: none;
        }

        /* 自定義滑桿樣式 (iOS風格) */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: #39394d;
            border-radius: 5px;
            outline: none;
            margin: 20px 0;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 26px;
            height: 26px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
        }

        /* 類型選擇按鈕 */
        .option-btn {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 14px;
            background: #39394d;
            border: none;
            color: #fff;
            font-weight: 600;
            font-size: 15px;
            transition: background 0.2s;
        }
        .option-btn:active {
            background: #5ac8fa;
            color: #000;
        }

        .icon-circle {
            width: 50px;
            height: 50px;
            background: #39394d;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="phone-container">
        
        <section id="page-overview" class="page active">
            <header class="nav-header">
                <i data-lucide="eye" class="s-icon"></i>
                <h1 class="page-title">帳戶總覽</h1>
                <div style="display: flex; gap: 15px;">
                    <i data-lucide="maximize" class="s-icon"></i>
                    <i data-lucide="plus" class="s-icon" onclick="showPage('page-add-account')"></i>
                </div>
            </header>

            <div class="content-scroll no-scrollbar">
                <div class="balance-hero">
                    <div class="label">總額 TWD</div>
                    <div class="amount" id="total-balance">0</div>
                    <div class="sub-stats">
                        <span>總資產 <span class="text-green">0</span></span>
                        <span>總負債 <span class="text-red">0</span></span>
                    </div>
                </div>

                <div class="list-divider">
                    <span class="date-text">● 2026/03/26 週四 <i data-lucide="rotate-ccw" class="s-icon"></i></span>
                    <div class="filter-btn">按日 <i data-lucide="chevron-down" class="s-icon"></i></div>
                </div>

                <div class="account-list">
                    <div class="group-item">
                        <span class="group-name">+ 現金 </span>
                        <span class="group-value text-red">-$0</span>
                    </div>
                </div>
            </div>
        </section>

        <section id="page-add-account" class="page">
            <header class="nav-header">
                <i data-lucide="x" class="s-icon" onclick="showPage('page-overview')"></i>
                <h1 class="page-title">新增帳戶 <i data-lucide="info" class="s-icon" style="width:14px"></i></h1>
                <i data-lucide="check" class="s-icon" onclick="showPage('page-overview')"></i>
            </header>

            <div class="content-scroll no-scrollbar">
                <div class="add-acc-hero">
                    <div class="icon-box"><i data-lucide="credit-card" style="width: 32px; height: 32px;"></i></div>
                    <div class="hero-balance">
                        <div class="label">餘額 TWD</div>
                        <div class="val text-green" id="add-display-amount">0</div>
                    </div>
                    <input type="text" class="memo-field" placeholder="請在這裡填寫備註事項">
                </div>

                <div class="form-group">
                    <div class="form-row">
                        <label>名稱</label>
                        <input type="text" placeholder="尚未設定" class="text-right">
                    </div>
                    
                    <div class="form-row" onclick="openGroupPicker()" style="cursor: pointer;">
                        <label>帳戶分組</label>
                        <span id="selected-group-text">現金 <i data-lucide="chevron-right" class="s-icon"></i></span>
                    </div>

                    <div class="form-row" onclick="openCyclePicker()" style="cursor: pointer;">
                        <label>帳單週期</label>
                        <span id="display-main-cycle" style="font-size: 14px;">2026/04/01 － 2026/04/30 <i data-lucide="chevron-right" class="s-icon"></i></span>
                    </div>

                    <div class="form-row">
                        <label>信用帳戶</label>
                        <label class="switch">
                            <input type="checkbox" id="in-is-credit" onchange="toggleCreditFields()">
                            <span class="slider"></span>
                        </label>
                    </div>

                    <div id="credit-extra-fields" style="display: none;">
                        <div class="form-row sub-row" onclick="openDueDateTypePicker()" style="cursor: pointer;">
                            <label>— 繳款期限</label>
                            <span id="display-main-due-date">2026/05/01 <i data-lucide="chevron-right" class="s-icon"></i></span>
                        </div>
                        <div class="form-row sub-row">
                            <label>— 信用額度</label>
                            <input type="number" placeholder="0" class="text-right">
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <div id="group-picker-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <div class="modal-header"><span>帳戶分組</span><i data-lucide="plus"></i></div>
                <div class="modal-options">
                    <div class="option-item" onclick="selectGroup('現金')">現金</div>
                    <div class="option-item" onclick="selectGroup('信用卡')">信用卡</div>
                </div>
                <div class="modal-footer"><button onclick="closeGroupPicker()">取消</button></div>
            </div>
        </div>

        <div id="cycle-picker-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">帳單週期</div>
                <div style="padding: 30px 20px; text-align: center;">
                    <div id="modal-cycle-range" style="font-size: 18px; font-weight: 700;">2026/04/01 － 2026/04/30</div>
                    <input type="range" id="cycle-slider" min="1" max="31" value="31">
                    <div id="modal-cycle-note" class="text-muted" style="font-size: 13px;">帳單結帳日：每月月底</div>
                </div>
                <div class="modal-footer">
                    <button onclick="closeModal('cycle-picker-modal')">取消</button>
                    <button class="btn-confirm" onclick="confirmCycle()">確定</button>
                </div>
            </div>
        </div>

        <div id="due-date-type-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content" style="width: 280px; text-align: center;">
                <div style="padding: 20px;">
                    <div class="icon-circle">!</div>
                    <div style="font-weight: 700; font-size: 17px; margin-bottom: 20px;">繳款期限</div>
                    <button class="option-btn" onclick="selectDueDateType('fixed')">每月固定第幾日</button>
                    <button class="option-btn" onclick="selectDueDateType('after')">結帳日後第幾日</button>
                </div>
            </div>
        </div>

        <nav class="tab-bar">
            <div class="tab-item active" onclick="showPage('page-overview')"><i data-lucide="archive"></i></div>
            <div class="tab-fab"><div class="fab-inner"><i data-lucide="layers"></i></div></div>
            <div class="tab-item"><i data-lucide="sliders-horizontal"></i></div>
        </nav>
    </div>

    <script>
        lucide.createIcons();

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // --- 帳戶分組邏輯 ---
        function openGroupPicker() { document.getElementById('group-picker-modal').style.display = 'flex'; }
        function closeGroupPicker() { closeModal('group-picker-modal'); }
        function selectGroup(name) {
            document.getElementById('selected-group-text').innerHTML = `${name} <i data-lucide="chevron-right" class="s-icon"></i>`;
            lucide.createIcons();
            closeGroupPicker();
        }

        // --- 帳單週期滑桿邏輯 ---
        function openCyclePicker() { document.getElementById('cycle-picker-modal').style.display = 'flex'; }
        
        const slider = document.getElementById('cycle-slider');
        slider.addEventListener('input', (e) => {
            const day = parseInt(e.target.value);
            const rangeText = document.getElementById('modal-cycle-range');
            const noteText = document.getElementById('modal-cycle-note');
            
            if (day >= 28) {
                rangeText.innerText = "2026/04/01 － 2026/04/30";
                noteText.innerText = "帳單結帳日：每月月底";
            } else {
                const startDay = (day + 1).toString().padStart(2, '0');
                const endDay = day.toString().padStart(2, '0');
                rangeText.innerText = `2026/03/${startDay} － 2026/04/${endDay}`;
                noteText.innerText = `帳單結帳日：每月 ${day} 號`;
            }
        });

        function confirmCycle() {
            document.getElementById('display-main-cycle').innerHTML = document.getElementById('modal-cycle-range').innerText + ' <i data-lucide="chevron-right" class="s-icon"></i>';
            lucide.createIcons();
            closeModal('cycle-picker-modal');
        }

        // --- 繳款期限邏輯 ---
        function openDueDateTypePicker() { document.getElementById('due-date-type-modal').style.display = 'flex'; }
        
        function selectDueDateType(type) {
            closeModal('due-date-type-modal');
            let result = "";
            if (type === 'fixed') {
                const d = prompt("輸入每月固定繳款日 (1-31):", "1");
                result = d ? `每月 ${d} 號` : "尚未設定";
            } else {
                const d = prompt("輸入結帳日後幾天繳款:", "15");
                result = d ? `結帳日後 ${d} 天` : "尚未設定";
            }
            document.getElementById('display-main-due-date').innerHTML = result + ' <i data-lucide="chevron-right" class="s-icon"></i>';
            lucide.createIcons();
        }

        function toggleCreditFields() {
            const isCredit = document.getElementById('in-is-credit').checked;
            document.getElementById('credit-extra-fields').style.display = isCredit ? 'block' : 'none';
            document.getElementById('add-display-amount').className = isCredit ? 'val text-red' : 'val text-green';
        }
    </script>
</body>
</html>
