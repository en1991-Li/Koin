<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Koin記帳</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="phone-container">
        
        <main id="page-summary" class="page active">
            <header class="nav-header">
                <i data-lucide="eye"></i>
                <span class="page-title">帳戶總覽</span>
                <div class="header-right">
                    <i data-lucide="maximize"></i>
                    <i data-lucide="plus" onclick="showPage('page-add-account')"></i>
                </div>
            </header>

            <div class="content-scroll no-scrollbar">
                <section class="balance-hero">
                    <div class="label">總額 TWD</div>
                    <div class="amount text-red" id="summary-total">0</div>
                    <div class="sub-stats">
                        <span>總資產 <b class="text-green" id="summary-assets">0</b></span>
                        <span>總負債 <b class="text-red" id="summary-debts">0</b></span>
                    </div>
                    <div class="link-group">
                        <span><i data-lucide="pie-chart"></i> 各分組佔比</span>
                        <span><i data-lucide="pie-chart"></i> 各幣種佔比</span>
                    </div>
                </section>

                <section class="chart-section">
                    <canvas id="mainChart"></canvas>
                </section>

                <div class="list-divider">
                    <span class="date-text"><i data-lucide="calendar"></i> 2026/03/26 週四</span>
                    <div class="filter-btn">按日 <i data-lucide="chevron-down"></i></div>
                </div>

                <div id="account-list" class="account-group-list">
                    </div>
            </div>
        </main>

        <main id="page-projects" class="page">
            <header class="nav-header">
                <div></div>
                <span class="page-title">專案總覽</span>
                <i data-lucide="plus"></i>
            </header>
            <div class="content-scroll no-scrollbar">
                <div class="group-title">— 進行中 (8)</div>
                <div id="project-list" class="project-items">
                    </div>
            </div>
        </main>

        <main id="page-add-account" class="page full-modal">
            <header class="nav-header">
                <i data-lucide="x" onclick="showPage('page-summary')"></i>
                <span class="page-title">新增帳戶 <i data-lucide="info" class="s-icon"></i></span>
                <i data-lucide="check" class="text-blue" onclick="saveNewAccount()"></i>
            </header>
            <div class="content-scroll">
                <div class="add-acc-hero">
                    <div class="icon-box"><i data-lucide="credit-card"></i></div>
                    <div class="hero-balance">
                        <span class="label">餘額 TWD</span>
                        <span class="val text-green" id="add-display-amount">0</span>
                    </div>
                    <input type="text" class="memo-field" placeholder="請在這裡填寫備註事項">
                </div>

                <div class="form-group">
                    <div class="form-row">
                        <label>名稱</label>
                        <input type="text" id="in-name" placeholder="尚未設定" class="text-right">
                    </div>
                    <div class="form-row">
                        <label>主幣種</label>
                        <span>TWD</span>
                    </div>
                    <div class="form-row">
                        <label>帳戶分組</label>
                        <span>現金 <i data-lucide="chevron-right"></i></span>
                    </div>
                    <div class="form-row">
                        <label>初始金額</label>
                        <input type="number" id="in-amount" value="0" class="text-right">
                    </div>
                    <div class="spacer"></div>
                    <div class="form-row">
                        <label>信用帳戶</label>
                        <label class="switch">
                            <input type="checkbox" id="in-is-credit">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="form-row">
                        <label>納入總餘額</label>
                        <label class="switch">
                            <input type="checkbox" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>
        </main>

        <nav class="tab-bar">
            <div class="tab-item active" onclick="showPage('page-summary')"><i data-lucide="wallet"></i></div>
            <div class="tab-item" onclick="showPage('page-projects')"><i data-lucide="briefcase"></i></div>
            <div class="tab-fab">
                <div class="fab-inner"><i data-lucide="plus"></i></div>
            </div>
            <div class="tab-item"><i data-lucide="line-chart"></i></div>
            <div class="tab-item"><i data-lucide="sliders-horizontal"></i></div>
        </nav>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
