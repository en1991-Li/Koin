<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Koin記帳</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .form-select, .form-date {
            background: transparent;
            border: none;
            color: #FFFFFF;
            font-size: 15px;
            text-align: right;
            outline: none;
            direction: rtl;
            appearance: none;
        }
        /* 讓文字點擊區域像按鈕一樣 */
        .clickable-val {
            color: #ffffff;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .text-blue { color: #5d5dff; }
    </style>
</head>
<body>

    <div class="phone-container">
        
        <section id="page-overview" class="page active">
            <header class="nav-header">
                <i data-lucide="eye" class="s-icon"></i>
                <h1 class="page-title">帳戶總覽</h1>
                <div style="display: flex; gap: 15px;">
                    <i data-lucide="maximize" class="s-icon"></i>
                    <i data-lucide="plus" class="s-icon" onclick="showPage('page-add-account')"></i>
                </div>
            </header>

            <div class="content-scroll no-scrollbar">
                <div class="balance-hero">
                    <div class="label">總額 TWD</div>
                    <div class="amount" id="total-balance">0</div>
                    <div class="sub-stats">
                        <span>總資產 <span class="text-green">0</span></span>
                        <span>總負債 <span class="text-red">0</span></span>
                    </div>
                    <div class="link-group">
                        <span><i data-lucide="pie-chart" class="s-icon"></i> 各分組佔比</span>
                        <span><i data-lucide="pie-chart" class="s-icon"></i> 各幣種佔比</span>
                    </div>
                </div>

                <div class="chart-section">
                    <canvas id="overviewChart"></canvas>
                </div>

                <div class="list-divider">
                    <span class="date-text">● 2026/03/26 週四 <i data-lucide="rotate-ccw" class="s-icon"></i></span>
                    <div class="filter-btn">按日 <i data-lucide="chevron-down" class="s-icon"></i></div>
                </div>

                <div class="account-list">
                    <div class="group-item">
                        <span class="group-name">+ 現金 </span>
                        <span class="group-value text-red">-$0</span>
                    </div>
                    <div class="group-item">
                        <span class="group-name">+ 銀行 </span>
                        <span class="group-value text-green">+$0</span>
                    </div>
                </div>
            </div>
        </section>

        <section id="page-add-account" class="page">
            <header class="nav-header">
                <i data-lucide="x" class="s-icon" onclick="showPage('page-overview')"></i>
                <h1 class="page-title">新增帳戶 <i data-lucide="info" class="s-icon" style="width:14px"></i></h1>
                <i data-lucide="check" class="s-icon" onclick="showPage('page-overview')"></i>
            </header>

            <div class="content-scroll no-scrollbar">
                <div class="add-acc-hero">
                    <div class="icon-box">
                        <i data-lucide="credit-card" style="width: 32px; height: 32px;"></i>
                    </div>
                    <div class="hero-balance">
                        <div class="label">餘額 TWD</div>
                        <div class="val text-green" id="add-display-amount">0</div>
                    </div>
                    <input type="text" class="memo-field" placeholder="請在這裡填寫備註事項">
                </div>

                <div class="form-group">
                    <div class="form-row">
                        <label>名稱</label>
                        <input type="text" placeholder="尚未設定" class="text-right">
                    </div>
                    <div class="form-row" onclick="openGroupPicker()" style="cursor: pointer;">
                        <label>帳戶分組</label>
                        <span id="selected-group-text" class="clickable-val">現金 <i data-lucide="chevron-right" class="s-icon"></i></span>
                    </div>
                    <div class="form-row">
                        <label>初始金額</label>
                        <input type="number" value="0" class="text-right">
                    </div>

                    <div class="form-row" onclick="openCyclePicker()" style="cursor: pointer;">
                        <label>帳單週期</label>
                        <span id="main-cycle-display" class="clickable-val">每月月底 <i data-lucide="chevron-right" class="s-icon"></i></span>
                    </div>

                    <div class="form-row">
                        <label>信用帳戶</label>
                        <label class="switch">
                            <input type="checkbox" id="in-is-credit" onchange="toggleCreditFields()">
                            <span class="slider"></span>
                        </label>
                    </div>

                    <div id="credit-extra-fields" style="display: none;">
                        <div class="form-row sub-row" onclick="openDueDateModal()" style="cursor: pointer;">
                            <label>— 繳款期限</label>
                            <span id="due-date-display" class="clickable-val text-blue">尚未設定 <i data-lucide="chevron-right" class="s-icon"></i></span>
                        </div>
                        <div class="form-row sub-row">
                            <label>— 信用額度</label>
                            <input type="number" placeholder="0" class="text-right">
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <div id="group-picker-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">帳戶分組</div>
                <div class="modal-options">
                    <div class="option-item" onclick="selectGroup('現金')">現金</div>
                    <div class="option-item" onclick="selectGroup('銀行')">銀行</div>
                    <div class="option-item" onclick="selectGroup('數位銀行')">數位銀行</div>
                    <div class="option-item" onclick="selectGroup('信用卡')">信用卡</div>
                </div>
                <div class="modal-footer">
                    <button onclick="closeModal('group-picker-modal')">取消</button>
                </div>
            </div>
        </div>

        <div id="cycle-picker-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">帳單週期</div>
                <div style="padding: 30px 20px; text-align: center;">
                    <div id="display-cycle-range" style="font-size: 18px; font-weight: 700; margin-bottom: 20px; color: #5d5dff;">
                        每月月底
                    </div>
                    <input type="range" id="cycle-slider" min="1" max="31" value="31" style="width: 100%;" oninput="updateCycleText(this.value)">
                    <div style="display: flex; justify-content: space-between; font-size: 12px; margin-top: 10px; color: #aaa;">
                        <span>1號</span><span>15號</span><span>月底</span>
                    </div>
                </div>
                <div class="modal-footer">
                    <button onclick="closeModal('cycle-picker-modal')">取消</button>
                    <button class="btn-confirm" onclick="confirmCycle()">確定</button>
                </div>
            </div>
        </div>

        <div id="due-date-type-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content" style="width: 280px; text-align: center; padding: 20px;">
                <div class="icon-box" style="width: 50px; height: 50px; margin: 0 auto 15px; background: #39394d; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                    <span style="font-size: 24px; font-weight: bold; color: #fff;">!</span>
                </div>
                <div style="font-weight: 700; margin-bottom: 20px; font-size: 16px;">繳款期限</div>
                <button class="option-item" onclick="selectDueDateType('固定日期')" style="width: 100%; text-align: center; margin-bottom: 10px; background: #39394d; border: none; color: white; border-radius: 12px; padding: 15px;">每月固定第幾日</button>
                <button class="option-item" onclick="selectDueDateType('結帳日後')" style="width: 100%; text-align: center; background: #39394d; border: none; color: white; border-radius: 12px; padding: 15px;">結帳日後第幾日</button>
                <div class="modal-footer" style="margin-top: 10px;">
                    <button onclick="closeModal('due-date-type-modal')" style="width: 100%;">取消</button>
                </div>
            </div>
        </div>

        <nav class="tab-bar">
            <div class="tab-item active" onclick="showPage('page-overview')"><i data-lucide="archive"></i></div>
            <div class="tab-item"><i data-lucide="wallet"></i></div>
            <div class="tab-fab"><div class="fab-inner"><i data-lucide="layers"></i></div></div>
            <div class="tab-item"><i data-lucide="trending-up"></i></div>
            <div class="tab-item"><i data-lucide="sliders-horizontal"></i></div>
        </nav>
    </div>

    <script>
        lucide.createIcons();

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        // 通用關閉 Modal
        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        // 分組選擇
        function openGroupPicker() { document.getElementById('group-picker-modal').style.display = 'flex'; }
        function selectGroup(name) {
            document.getElementById('selected-group-text').innerHTML = `${name} <i data-lucide="chevron-right" class="s-icon"></i>`;
            lucide.createIcons();
            closeModal('group-picker-modal');
        }

        // 帳單週期滑桿邏輯
        function openCyclePicker() { document.getElementById('cycle-picker-modal').style.display = 'flex'; }
        function updateCycleText(val) {
            const display = document.getElementById('display-cycle-range');
            display.innerText = val == 31 ? "每月月底" : `每月 ${val} 號`;
        }
        function confirmCycle() {
            const val = document.getElementById('cycle-slider').value;
            document.getElementById('main-cycle-display').innerHTML = `${val == 31 ? "每月月底" : val + " 號"} <i data-lucide="chevron-right" class="s-icon"></i>`;
            lucide.createIcons();
            closeModal('cycle-picker-modal');
        }

        // 繳款期限邏輯
        function openDueDateModal() { document.getElementById('due-date-type-modal').style.display = 'flex'; }
        function selectDueDateType(type) {
            document.getElementById('due-date-display').innerHTML = `${type} <i data-lucide="chevron-right" class="s-icon"></i>`;
            lucide.createIcons();
            closeModal('due-date-type-modal');
        }

        function toggleCreditFields() {
            const isCredit = document.getElementById('in-is-credit').checked;
            const extraFields = document.getElementById('credit-extra-fields');
            const displayVal = document.getElementById('add-display-amount');
            if (isCredit) {
                extraFields.style.display = 'block';
                displayVal.className = 'val text-red';
            } else {
                extraFields.style.display = 'none';
                displayVal.className = 'val text-green';
            }
        }
    </script>
</body>
</html>
