<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koin - 帳戶總覽</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body {
            background-color: #1c1c28;
            font-family: 'Inter', -apple-system, sans-serif;
            color: #ffffff;
        }
        .text-moze-red { color: #f16565; }
        .bg-moze-dark { background-color: #252538; }
        .border-moze { border-color: #32324d; }
    </style>
</head>
<body class="antialiased">

    <div class="max-w-md mx-auto min-h-screen flex flex-col pb-20">
        <div class="flex justify-between p-6">
            <i data-lucide="eye" class="w-6 h-6 text-slate-400"></i>
            <h2 class="text-lg font-bold">帳戶總覽</h2>
            <div class="flex gap-4">
                <i data-lucide="maximize" class="w-6 h-6 text-slate-400"></i>
                <i data-lucide="plus" class="w-6 h-6 text-slate-400"></i>
            </div>
        </div>

        <div class="text-center mb-6">
            <p class="text-[10px] text-slate-500 font-bold tracking-widest uppercase">總額 TWD</p>
            <h1 class="text-6xl font-black text-moze-red my-1">1,524</h1>
            <div class="flex justify-center gap-4 text-[11px]">
                <span class="text-slate-400">總資產 <span class="text-emerald-400 font-bold ml-1">34,782</span></span>
                <span class="text-slate-400">總負債 <span class="text-rose-400 font-bold ml-1">36,306</span></span>
            </div>
            <div class="flex justify-center gap-6 mt-4 text-[10px] text-slate-400 font-semibold">
                <span class="flex items-center gap-1"><i data-lucide="pie-chart" class="w-3 h-3"></i> 各分組佔比</span>
                <span class="flex items-center gap-1"><i data-lucide="pie-chart" class="w-3 h-3"></i> 各幣種佔比</span>
            </div>
        </div>

        <div class="px-4 mb-6">
            <div class="h-40 w-full">
                <canvas id="assetChart"></canvas>
            </div>
            <div class="flex justify-between text-[10px] text-slate-500 mt-2 px-2">
                <span>3/17</span><span>3/19</span><span>3/21</span><span>3/23</span><span>3/25</span>
            </div>
        </div>

        <div class="flex justify-between items-center px-6 py-2 text-[11px] text-slate-500 border-b border-moze">
            <div class="flex items-center gap-1">
                <div class="w-2 h-2 rounded-full bg-blue-500"></div>
                2026/03/26 週四 <i data-lucide="help-circle" class="w-3 h-3"></i>
            </div>
            <div class="bg-moze-dark px-2 py-1 rounded flex items-center gap-1">
                <i data-lucide="calendar" class="w-3 h-3"></i> 按日 <i data-lucide="chevron-down" class="w-3 h-3"></i>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto">
            <div class="divide-y divide-moze">
                <div class="account-item flex justify-between p-5 items-center">
                    <div class="flex items-center gap-3">
                        <i data-lucide="plus" class="w-4 h-4 text-slate-600"></i>
                        <span class="text-sm font-semibold">現金 (3)</span>
                    </div>
                    <span class="font-mono font-bold text-moze-red">-$36,306</span>
                </div>
                <div class="account-item flex justify-between p-5 items-center">
                    <div class="flex items-center gap-3">
                        <i data-lucide="plus" class="w-4 h-4 text-slate-600"></i>
                        <span class="text-sm font-semibold">銀行 (4)</span>
                    </div>
                    <span class="font-mono font-bold text-emerald-400">+$32,571</span>
                </div>
                <div class="account-item flex justify-between p-5 items-center">
                    <div class="flex items-center gap-3">
                        <i data-lucide="plus" class="w-4 h-4 text-slate-600"></i>
                        <span class="text-sm font-semibold">數位銀行 (8)</span>
                    </div>
                    <span class="font-mono font-bold text-emerald-400">+$2,211</span>
                </div>
                <div class="account-item flex justify-between p-5 items-center">
                    <div class="flex items-center gap-3">
                        <i data-lucide="plus" class="w-4 h-4 text-slate-600"></i>
                        <span class="text-sm font-semibold text-slate-500">紅利點數 (1)</span>
                    </div>
                    <span class="font-mono font-bold text-slate-500">$0</span>
                </div>
            </div>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-[#1c1c28]/90 backdrop-blur-md border-t border-moze flex justify-around p-3 items-center">
            <i data-lucide="layout-grid" class="w-6 h-6 text-blue-400"></i>
            <i data-lucide="wallet" class="w-6 h-6 text-slate-500"></i>
            <div class="bg-gradient-to-tr from-purple-500 to-pink-500 p-3 rounded-2xl shadow-lg shadow-purple-500/20 transform -translate-y-2">
                <i data-lucide="aperture" class="w-6 h-6 text-white"></i>
            </div>
            <i data-lucide="trending-up" class="w-6 h-6 text-slate-500"></i>
            <i data-lucide="sliders" class="w-6 h-6 text-slate-500"></i>
        </nav>
    </div>

    <script>
        // 初始化 Lucide 圖標
        lucide.createIcons();

        // 繪製資產圖表
        const ctx = document.getElementById('assetChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['', '', '3/18', '', '', '', '', '', ''],
                datasets: [
                    {
                        label: 'Bar',
                        data: [0, 0, 18, 0, 1, 0, 0, 0, 0],
                        backgroundColor: '#a3e635', // 亮綠色
                        borderRadius: 2,
                        barThickness: 15,
                    },
                    {
                        type: 'line',
                        label: 'Trend',
                        data: [2, 2, 8, 8, 7, 7, 6.5, 6.2, 6],
                        borderColor: '#8b5cf6', // 紫色線
                        borderWidth: 3,
                        pointRadius: 0,
                        tension: 0.1,
                        fill: false
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { display: false, max: 20 },
                    x: { display: false }
                }
            }
        });
    </script>
</body>
</html>
