<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Koin記帳</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 僅保留頁面專屬的微調，其餘皆已移至 style.css */
        .clickable-val {
            color: #ffffff;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .text-blue { color: #5d5dff; }
    </style>
</head>
<body>
    <div class="phone-container">
        <section id="page-overview" class="page active">
            <header class="nav-header">
                <i data-lucide="eye" class="s-icon"></i>
                <h1 class="page-title">帳戶總覽</h1>
                <div style="display: flex; gap: 15px;">
                    <i data-lucide="maximize" class="s-icon"></i>
                    <i data-lucide="plus" class="s-icon" onclick="showPage('page-add-account')"></i>
                </div>
            </header>

            <div class="content-scroll no-scrollbar">
               <div class="balance-hero">
                <div class="label">總額 TWD</div>
                <div class="amount" id="total-balance">0</div>
                <div class="sub-stats">
                <span>總資產 <span class="text-green" id="total-assets">0</span></span>
                <span>總負債 <span class="text-red" id="total-debts">0</span></span>
            </div>
        </div>
       
        </section>

        <section id="page-add-account" class="page">
            <header class="nav-header">
                <i data-lucide="x" class="s-icon" onclick="showPage('page-overview')"></i>
                <h1 class="page-title">新增帳戶</h1>
                <i data-lucide="check" class="s-icon" onclick="saveAccount()"></i>
            </header>

            <div class="content-scroll no-scrollbar">
                <div class="add-acc-hero">
                    <div class="icon-box"><i data-lucide="credit-card" style="width: 32px; height: 32px;"></i></div>
                    <div class="hero-balance">
                        <div class="label">餘額 TWD</div>
                        <div class="val text-green" id="add-display-amount">0</div>
                    </div>
                </div>

                <div class="form-group">
                    <div class="form-row">
                        <label>名稱</label>
                        <input type="text" id="acc-name" placeholder="尚未設定" class="text-right">
                    </div>
                    <div class="form-row" onclick="openGroupPicker()">
                        <label>帳戶分組</label>
                        <span id="selected-group-text" class="clickable-val">現金 <i data-lucide="chevron-right" class="s-icon"></i></span>
                    </div>
                    <div class="form-row">
                        <label>初始金額</label>
                        <input type="number" id="acc-amount" value="0" class="text-right">
                    </div>
                    <div class="form-row" onclick="openCyclePicker()">
                        <label>帳單週期</label>
                        <span id="main-cycle-display" class="clickable-val">每月月底 <i data-lucide="chevron-right" class="s-icon"></i></span>
                    </div>
                    <div class="form-row">
                        <label>信用帳戶</label>
                        <label class="switch">
                            <input type="checkbox" id="in-is-credit" onchange="toggleCreditFields()">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div id="credit-extra-fields" style="display: none;">
                        <div class="form-row sub-row" onclick="openDueDateModal()">
                            <label>— 繳款期限</label>
                            <span id="due-date-display" class="clickable-val text-blue">尚未設定 <i data-lucide="chevron-right" class="s-icon"></i></span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="page-projects" class="page">
    <header class="nav-header">
        <div style="width: 24px;"></div> 
        <h1 class="page-title">專案總覽</h1>
        <i data-lucide="plus" class="s-icon" onclick="showPage('page-add-project')"></i>
    </header>
    <div class="content-scroll no-scrollbar" id="projects-list-container"></div>
</section>

        <section id="page-add-project" class="page">
    <header class="nav-header">
        <i data-lucide="x" class="s-icon" onclick="showPage('page-projects')"></i>
        <h1 class="page-title">新增專案 <i data-lucide="info" style="width:14px;"></i></h1>
        <i data-lucide="check" class="s-icon" onclick="saveProject()"></i>
    </header>

    <div class="content-scroll no-scrollbar">
        <div class="add-acc-hero">
            <div class="icon-box" style="background: #3d3d4d;">
                <i data-lucide="piggy-bank" style="width: 40px; height: 40px; color: #fff;"></i>
            </div>
        </div>

        <div class="form-group">
            <div class="form-row">
                <label>名稱</label>
                <input type="text" id="proj-name" placeholder="尚未設定" class="text-right">
            </div>
            <div class="form-row">
                <label>主幣種</label>
                <span class="clickable-val">TWD</span>
            </div>
            <div class="form-row">
                <label>週期類型</label>
                <span class="clickable-val">重複循環</span>
            </div>
            <div class="form-row">
                <label>結算週期</label>
                <span class="clickable-val">每月</span>
            </div>
            <div class="form-row">
                <label>起始日期</label>
                <span class="clickable-val">第 1 天</span>
            </div>
            <div class="form-row">
                <label>自動沿用上期預算</label>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                </label>
            </div>
            <div class="form-row">
                <label>顯示統計在首頁</label>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                </label>
            </div>
            <div class="form-row">
                <label>統計專案</label>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </div>
            
            <div style="padding: 15px;">
                <textarea id="proj-note" placeholder="備註" 
                    style="width: 100%; background: #2c2c3e; border: none; border-radius: 12px; 
                           color: white; padding: 15px; min-height: 120px; outline: none;"></textarea>
            </div>
        </div>
    </div>
</section>

        <section id="page-calendar" class="page">
            <header class="nav-header">
                <i data-lucide="bell" class="s-icon"></i> 
                <h1 class="page-title" id="full-calendar-month">2026/04</h1>
                <div style="display: flex; gap: 15px;">
                    <i data-lucide="calendar-range" class="s-icon"></i>
                    <i data-lucide="search" class="s-icon"></i>
                </div>
            </header>
            <div class="calendar-grid-header">
                <span>週日</span><span>週一</span><span>週二</span><span>週三</span><span>週四</span><span>週五</span><span>週六</span>
            </div>
            <div class="calendar-horizontal-container no-scrollbar" id="calendar-month-slider"></div>
            <div class="daily-details-section" id="daily-details-list"></div>
        </section>

        <section id="page-add-record" class="page">
    <header class="nav-header">
        <i data-lucide="x" class="s-icon" onclick="showPage('page-calendar')"></i>
        <h1 class="page-title">新增記錄</h1>
        <i data-lucide="check" class="s-icon" onclick="saveRecord()"></i>
    </header>

    <div class="content-scroll no-scrollbar">
        <div class="record-tabs" style="display: flex; overflow-x: auto; padding: 15px; gap: 20px; color: #8a8a8e;">
            <span class="active text-blue">建議</span><span>支出</span><span>收入</span><span>轉帳</span><span>應收款項</span>
        </div>

        <div class="brand-grid" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 10px 20px;">
            <div class="brand-item"><div class="brand-icon">🥤</div><p>可不可</p></div>
            <div class="brand-item"><div class="brand-icon">🏪</div><p>7-11</p></div>
            <div class="brand-item"><div class="brand-icon">🍔</div><p>麥當勞</p></div>
            <div class="brand-item"><div class="brand-icon">🏪</div><p>全家</p></div>
            <div class="brand-item"><div class="brand-icon">🖨️</div><p>影印費</p></div>
        </div>

        <div class="record-form" style="padding: 20px;">
            <div class="amount-input-box" style="background: #2c2c3e; border-radius: 15px; padding: 15px; display: flex; justify-content: space-between; align-items: center;">
                <span style="background: #3d3d4d; padding: 5px 12px; border-radius: 8px;">TWD</span>
                <span style="font-size: 28px; font-weight: bold;">0 <span style="font-size: 18px; color: #5d5dff;">+</span></span>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px;">
                <div class="form-btn">錢包</div>
                <div class="form-btn">生活開銷</div>
                <div class="form-btn">商家</div>
                <div class="form-btn">單次</div>
            </div>

            <textarea placeholder="備註" style="width: 100%; background: #2c2c3e; border: none; border-radius: 12px; color: white; padding: 15px; margin-top: 15px; min-height: 100px;"></textarea>
         </div>
     </div>
 </section>

        <div id="group-picker-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">帳戶分組</div>
                <div class="modal-options">
                    <div class="option-item" onclick="selectGroup('現金')">現金</div>
                    <div class="option-item" onclick="selectGroup('銀行')">銀行</div>
                    <div class="option-item" onclick="selectGroup('數位銀行')">數位銀行</div>
                    <div class="option-item" onclick="selectGroup('信用卡')">信用卡</div>
                </div>
                <div class="modal-footer"><button onclick="closeModal('group-picker-modal')">取消</button></div>
            </div>
        </div>

       <div id="cycle-picker-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content" style="padding: 24px;">
        <div class="modal-header" style="border:none; padding-bottom: 0;">帳單週期</div>
        <div style="text-align: center; margin: 20px 0;">
            <div id="modal-date-range" style="font-size: 20px; font-weight: 800; color: #ffffff; margin-bottom: 8px;">2026/04/01 – 2026/04/30</div>
            <div id="modal-cycle-note" class="text-muted" style="font-size: 13px;">帳單結帳日：每月月底</div>
        </div>
        <div class="slider-container">
            <input type="range" id="cycle-slider" min="1" max="31" value="31" style="width: 100%;" oninput="updateCycleText(this.value)">
        </div>
        <div class="modal-footer" style="margin-top: 25px; border: none; gap: 10px;">
            <button style="background: #39394d; border-radius: 12px;" onclick="closeModal('cycle-picker-modal')">取消</button>
            <button class="btn-confirm" style="background: #5d5dff; border-radius: 12px;" onclick="confirmCycle()">確定</button>
        </div>
    </div>
</div>

<div id="due-date-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content due-date-picker">
        <div class="modal-header">繳款期限</div>
        <div class="mode-selector" id="due-mode-selection">
            <div class="option-item" onclick="enterDueDetail('fixed')">每月固定第幾日</div>
            <div class="option-item" onclick="enterDueDetail('offset')">結帳日後第幾日</div>
        </div>
        <div id="due-detail-picker" style="display: none;">
            <div class="picker-container no-scrollbar" id="picker-scroll-list"></div>
            <div class="modal-footer" style="border:none;">
                <button onclick="backToDueMode()">返回</button>
                <button class="btn-confirm" style="background: #5d5dff;" onclick="confirmDueDate()">確定</button>
            </div>
        </div>
        <div class="modal-footer" id="due-mode-footer" style="border:none;">
            <button onclick="closeModal('due-date-modal')">取消</button>
        </div>
    </div>
</div>
 <nav class="tab-bar">
    <div class="tab-item active" onclick="showPage('page-overview', this)"><i data-lucide="archive"></i></div>
    <div class="tab-item" onclick="showPage('page-projects', this)"><i data-lucide="wallet"></i></div>
    
    <div class="tab-fab" id="main-fab" onclick="handleFabClick(this)"> 
        <div class="fab-inner"><i data-lucide="layers"></i></div>
    </div>
    
    <div class="tab-item" onclick="showPage('page-trends', this)"><i data-lucide="trending-up"></i></div>
    <div class="tab-item" onclick="showPage('page-settings', this)"><i data-lucide="sliders-horizontal"></i></div>
 </nav>

    </div>
   <script src="js/projects.js"></script>    
   <script src="js/calendar.js"></script>
   <script src="js/script.js"></script>

<script>
   
</script>

</body>
