<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Koin記帳</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="phone-container">
        <div id="overlay" class="overlay" onclick="closeAllSheets()"></div>

        <main class="content-area no-scrollbar">
            <div id="page-list" class="page active">
                <header class="top-nav">
                    <i data-lucide="eye" class="icon-btn"></i>
                    <h2 class="title">帳戶總覽</h2>
                    <div class="right-icons">
                        <i data-lucide="maximize" class="icon-btn"></i>
                        <i data-lucide="plus" class="icon-btn" onclick="openAddPage()"></i>
                    </div>
                </header>

                <section class="dashboard">
                    <div class="total-box">
                        <p class="total-label">總額 TWD</p>
                        <h1 id="total-val" class="total-amount">0</h1>
                    </div>
                    <div class="stats-row">
                        <span class="stat-item">總資產 <b id="asset-val" class="text-green">0</b></span>
                        <span class="stat-item">總負債 <b id="debt-val" class="text-red">0</b></span>
                    </div>
                    <div class="chart-links">
                        <span><i data-lucide="pie-chart" class="small-icon"></i> 各分組佔比</span>
                        <span><i data-lucide="pie-chart" class="small-icon"></i> 各幣種佔比</span>
                    </div>
                </section>

                <div id="main-list" class="account-list">
                    <div class="empty-state">尚未建立帳戶</div>
                </div>
            </div>

            <div id="page-add-account" class="page">
                <header class="top-nav">
                    <i data-lucide="x" class="icon-btn" onclick="closeAddPage()"></i>
                    <h2 class="title">新增帳戶</h2>
                    <div class="right-icons">
                        <i data-lucide="check" class="icon-btn" onclick="saveAccount()"></i>
                    </div>
                </header>

                <section class="add-account-form">
                    <div class="account-header-icon">
                        <div class="icon-circle">
                            <i data-lucide="credit-card"></i>
                        </div>
                        <div class="balance-display">
                            <span class="label">餘額 TWD</span>
                            <span class="value">0</span>
                        </div>
                        <input type="text" class="memo-input" placeholder="請在這裡填寫備註事項">
                    </div>

                    <div class="form-list">
                        <div class="form-item">
                            <label>名稱</label>
                            <input type="text" placeholder="尚未設定" id="acc-name">
                        </div>
                        <div class="form-item">
                            <label>主幣種</label>
                            <span class="val-text">TWD</span>
                        </div>
                        <div class="form-item">
                            <label>帳戶分組</label>
                            <span class="val-text">現金</span>
                        </div>
                        <div class="form-item">
                            <label>初始金額</label>
                            <input type="number" value="0" id="acc-balance">
                        </div>
                        <div class="form-item">
                            <label>帳單週期</label>
                            <span class="val-text">2026/03/01 - 2026/03/31</span>
                        </div>
                        
                        <hr class="divider">

                        <div class="form-item">
                            <label>信用帳戶</label>
                            <label class="switch">
                                <input type="checkbox" id="is-credit">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="form-item">
                            <label>主帳戶</label>
                            <span class="val-text gray">無</span>
                        </div>
                        <div class="form-item">
                            <label>紅利回饋</label>
                            <span class="val-text gray">無</span>
                        </div>
                        <div class="form-item">
                            <label>自動儲值</label>
                            <label class="switch">
                                <input type="checkbox">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="form-item">
                            <label>國外交易手續費</label>
                            <label class="switch">
                                <input type="checkbox">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="form-item">
                            <label>納入總餘額</label>
                            <label class="switch">
                                <input type="checkbox" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="form-item">
                            <label>顯示在 Widget / Watch 上</label>
                            <label class="switch">
                                <input type="checkbox" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                </section>
            </div>
        </main>

        <nav class="tab-bar">
            <div class="tab-item active" onclick="switchTab(this, 'page-list')">
                <i data-lucide="wallet" class="tab-icon"></i>
            </div>
            <div class="tab-item" onclick="alert('功能開發中')">
                <i data-lucide="briefcase" class="tab-icon"></i>
            </div>
            
            <div class="fab-wrapper" onclick="openAddPage()">
                <div class="fab-diamond">
                    <div class="fab-icon">
                        <i data-lucide="plus"></i>
                    </div>
                </div>
            </div>

            <div class="tab-item" onclick="alert('功能開發中')">
                <i data-lucide="line-chart" class="tab-icon"></i>
            </div>
            <div class="tab-item" onclick="alert('功能開發中')">
                <i data-lucide="sliders-horizontal" class="tab-icon"></i>
            </div>
        </nav>
    </div>

    <script src="js/script.js"></script>
    <script>
        // 簡單的頁面切換邏輯
        function openAddPage() {
            document.getElementById('page-list').classList.remove('active');
            document.getElementById('page-add-account').classList.add('active');
            lucide.createIcons(); // 重新渲染圖標
        }

        function closeAddPage() {
            document.getElementById('page-add-account').classList.remove('active');
            document.getElementById('page-list').classList.add('active');
        }

        function saveAccount() {
            const name = document.getElementById('acc-name').value;
            if(!name) {
                alert('請輸入帳戶名稱');
                return;
            }
            alert('帳戶 ' + name + ' 已儲存！');
            closeAddPage();
        }
    </script>
</body>
</html>
