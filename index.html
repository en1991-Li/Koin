<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koin記帳</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        :root { --bg: #1c1c28; --card: #252538; --border: #32324d; --blue: #60a5fa; --green: #a3e635; }
        body { background-color: black; font-family: 'Inter', sans-serif; color: white; margin: 0; overflow: hidden; }
        .phone-container { width: 100%; max-width: 414px; height: 100vh; background: var(--bg); position: relative; margin: 0 auto; overflow: hidden; }
        
        .page { position: absolute; inset: 0; background: var(--bg); display: none; flex-direction: column; z-index: 10; }
        .page.active { display: flex; }
        .page-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .sheet { position: absolute; bottom: 0; left: 0; right: 0; background: #2b2b3d; border-radius: 2rem 2rem 0 0; transform: translateY(100%); transition: transform 0.3s ease; z-index: 50; max-height: 70%; overflow-y: auto; }
        .sheet.active { transform: translateY(0); }
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); display: none; z-index: 40; }
        .overlay.active { display: block; }

        .switch { position: relative; display: inline-block; width: 42px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #3f3f5a; transition: .3s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--blue); }
        input:checked + .slider:before { transform: translateX(18px); }

        #credit-sub-menu { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; }
        #credit-sub-menu.show { max-height: 600px; }

        .list-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .label-text { font-size: 14px; font-weight: 600; color: #efefff; }
        .value-text { font-size: 13px; color: #7e7e9a; display: flex; align-items: center; gap: 4px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div class="phone-container">
    <div id="overlay" class="overlay" onclick="closeAllSheets()"></div>

    <div id="page-list" class="page active">
        <div class="flex justify-between items-center p-6">
            <i data-lucide="eye" class="w-7 h-7 text-gray-500"></i>
            <h2 class="text-xl font-bold">帳戶總覽</h2>
            <i data-lucide="plus" class="w-7 h-7 text-gray-500 cursor-pointer" onclick="openAddPage()"></i>
        </div>
        <div id="main-list" class="flex-1 overflow-y-auto no-scrollbar border-t border-[#32324d] p-10 text-center text-gray-600 italic">點擊 + 新增帳戶</div>
    </div>

    <div id="page-add" class="page page-up overflow-y-auto no-scrollbar">
        <div class="flex justify-between items-center p-6 sticky top-0 bg-[#1c1c28] z-20">
            <i data-lucide="x" class="w-8 h-8 cursor-pointer" onclick="closeAddPage()"></i>
            <h2 class="text-lg font-bold">新增帳戶</h2>
            <i data-lucide="check" class="w-8 h-8 text-blue-400 cursor-pointer" onclick="saveData()"></i>
        </div>

        <div class="flex flex-col items-center py-4">
            <div class="w-20 h-20 bg-[#252538] rounded-full flex items-center justify-center mb-4 border border-[#32324d]">
                <i data-lucide="credit-card" class="w-10 h-10 text-white/80"></i>
            </div>
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">餘額 TWD</p>
            <h1 id="preview-amt" class="text-6xl font-black text-[#a3e635] mt-1">0</h1>
        </div>

        <div class="mt-4 pb-10">
            <div class="list-row" onclick="document.getElementById('f-name').focus()">
                <span class="label-text">名稱</span>
                <input id="f-name" type="text" placeholder="尚未設定" class="bg-transparent text-right outline-none text-sm text-white w-40">
            </div>

            <div class="list-row" onclick="openSheet('sheet-group')">
                <span class="label-text">帳戶分組</span>
                <div class="value-text"><span id="val-group">現金</span><i data-lucide="chevron-right" class="w-4 h-4"></i></div>
            </div>

            <div class="list-row" onclick="document.getElementById('f-amount').focus()">
                <span class="label-text">初始金額</span>
                <input id="f-amount" type="number" value="0" oninput="document.getElementById('preview-amt').innerText=this.value" class="bg-transparent text-right outline-none text-sm text-white w-32 font-mono">
            </div>

            <div class="list-row" onclick="openSheet('sheet-cycle')">
                <span class="label-text">帳單週期</span>
                <div class="value-text"><span id="display-cycle">2026/03/01 – 2026/03/31</span><i data-lucide="chevron-right" class="w-4 h-4"></i></div>
            </div>

            <div class="list-row">
                <span class="label-text">信用帳戶</span>
                <label class="switch"><input type="checkbox" id="f-credit" onchange="document.getElementById('credit-sub-menu').classList.toggle('show', this.checked)"><span class="slider"></span></label>
            </div>

            <div id="credit-sub-menu">
                <div class="list-row"><span class="label-text text-blue-400 pl-4">信用額度</span><input type="number" placeholder="0" class="bg-transparent text-right outline-none text-sm text-white w-32"></div>
                <div class="list-row"><span class="label-text text-blue-400 pl-4">自動扣繳</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
            </div>

            <div class="list-row">
                <span class="label-text">納入總餘額</span>
                <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
            </div>
        </div>
    </div>

    <div id="sheet-cycle" class="sheet p-6">
        <h3 class="text-center text-gray-500 text-xs font-bold mb-6 tracking-widest">選擇結帳日</h3>
        <div class="grid grid-cols-5 gap-2">
            <script>
                for(let i=1; i<=31; i++) {
                    document.write(`<button onclick="updateCycle(${i})" class="p-3 text-center bg-white/5 rounded-lg text-xs hover:bg-blue-500/20">${i}</button>`);
                }
            </script>
        </div>
    </div>

    <div id="sheet-group" class="sheet p-6">
        <h3 class="text-center text-gray-500 text-xs font-bold mb-6">選擇分組</h3>
        <div class="space-y-2">
            <button onclick="setGroup('現金')" class="w-full p-4 text-left bg-white/5 rounded-xl text-sm">現金</button>
            <button onclick="setGroup('銀行')" class="w-full p-4 text-left bg-white/5 rounded-xl text-sm">銀行</button>
            <button onclick="setGroup('信用卡')" class="w-full p-4 text-left bg-white/5 rounded-xl text-sm">信用卡</button>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();

    function openAddPage() { document.getElementById('page-add').classList.add('active'); }
    function closeAddPage() { document.getElementById('page-add').classList.remove('active'); }
    function openSheet(id) { document.getElementById('overlay').classList.add('active'); document.getElementById(id).classList.add('active'); }
    function closeAllSheets() { document.getElementById('overlay').classList.remove('active'); document.querySelectorAll('.sheet').forEach(s=>s.classList.remove('active')); }
    
    function setGroup(val) { document.getElementById('val-group').innerText = val; closeAllSheets(); }

    // 自動計算日期區間
    function updateCycle(day) {
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth() + 1;
        
        // 格式化日期為 YYYY/MM/DD
        const start = `${year}/${String(month).padStart(2,'0')}/01`;
        const end = `${year}/${String(month).padStart(2,'0')}/${String(day).padStart(2,'0')}`;
        
        document.getElementById('display-cycle').innerText = `${start} – ${end}`;
        document.getElementById('display-cycle').classList.add('text-white');
        closeAllSheets();
    }

    function saveData() {
        alert("帳戶已儲存！");
        closeAddPage();
    }
</script>
</body>
</html>
